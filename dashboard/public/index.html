<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkillForge Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="header-left">
      <span class="logo">🦞</span>
      <div>
        <h1>SkillForge Dashboard</h1>
        <p class="subtitle">The Meta-Skill: Live Skill Generation</p>
      </div>
    </div>
    <div class="stats-bar" id="stats-bar">
      <span class="stat-pill" id="stat-skills">-- skills</span>
      <span class="stat-pill" id="stat-lines">-- lines</span>
      <span class="stat-pill" id="stat-scripts">-- scripts</span>
      <span class="status-dot" id="status-dot" title="Connecting..."></span>
    </div>
  </header>

  <main>
    <section class="gallery-panel" id="gallery-panel">
      <div class="panel-label">Skill Gallery</div>
      <div id="skill-list">
        <div class="empty-state" id="empty-state">
          <div class="pulse-ring"></div>
          <p>Waiting for skills...</p>
          <p class="empty-sub">Text your bot to create one.</p>
        </div>
      </div>
    </section>

    <section class="detail-panel" id="detail-panel">
      <div class="panel-label">Skill Inspector</div>
      <div id="detail-content" class="detail-placeholder">
        <p>Select a skill to inspect it.</p>
      </div>
    </section>
  </main>

  <div class="bottom-panels">
    <div class="chat-feed" id="chat-feed-bar">
      <div class="bottom-label">Live Chat</div>
      <div class="feed-scroll" id="chat-scroll"></div>
    </div>
    <footer class="live-feed" id="live-feed-bar">
      <div class="bottom-label">Event Log</div>
      <div class="feed-scroll" id="feed-scroll"></div>
    </footer>
  </div>

  <div class="page-footer">🦞 Built for HackPSU 2026</div>

  <script src="app.js"></script>
</body>
</html>
